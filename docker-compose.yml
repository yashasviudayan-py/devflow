services:
  postgres:
    image: postgres:18-alpine
    container_name: devflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devflow
      POSTGRES_USER: devflow_user
      POSTGRES_PASSWORD: devflow_password
    ports:
      - "5432:5432"
    volumes:
      - devflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow_user -d devflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  devflow_postgres_data:
