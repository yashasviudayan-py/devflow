name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest

    # Route tests run real SQL against a migrated schema, so the suite needs a
    # reachable Postgres. Migrations are applied by the test global setup.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: devflow_test
          POSTGRES_USER: devflow_user
          POSTGRES_PASSWORD: devflow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devflow_user -d devflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://devflow_user:devflow_password@localhost:5432/devflow_test?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
